<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE DESIGN | KARYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0a0a; color: white; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        header {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://files.catbox.moe/rd5c7r.jpg');
            background-size: cover; background-position: center; padding: 60px 8%;
            border-bottom: 5px solid #003366; text-align: center; position: relative; z-index: 100;
        }

        header h1 { color: white; font-size: 3rem; font-weight: 800; -webkit-text-stroke: 1px #003366; text-shadow: 3px 3px 0px #003366; }

        .nav-container { display: flex; justify-content: center; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        .nav-container a { text-decoration: none; color: #003366; font-weight: 700; padding: 10px 15px; border: 2px solid #003366; border-radius: 8px; transition: 0.3s; background: white; font-size: 0.9rem; }
        .nav-container a:hover { background: #003366; color: white; }

        /* Style Tab Admin Rahasia */
        #admin-tab { display: none; background: #ff4757; color: white; border-color: #ff4757; animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #ff4757; } to { box-shadow: 0 0 15px #ff4757; } }

        .admin-section { display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
        .btn-login { background: rgba(255, 255, 255, 0.1); color: rgba(255,255,255,0.5); padding: 5px 10px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 0.6rem; transition: 0.3s; }
        .btn-login:hover { color: white; border-color: white; }

        #upload-form-container {
            display: none; background: #111; padding: 25px; border-radius: 20px; border: 3px solid #ff4757;
            width: 90%; max-width: 500px; margin: 20px auto; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3);
        }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #ff4757; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .btn-submit { background: #ff4757; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .chibi-deco { position: absolute; width: 130px; z-index: 99; pointer-events: none; }
        .chibi-left { top: 400px; left: 20px; animation: bounce 4s infinite; }
        .chibi-right { top: 650px; right: 20px; animation: bounce 3s infinite; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 50px 8%; max-width: 1400px; margin: 0 auto; position: relative; z-index: 5; }
        .work-card { background: #111; border-radius: 20px; border: 1px solid #333; padding: 15px; transition: 0.3s; }
        .image-box { width: 100%; aspect-ratio: 1 / 1; background: #001a33; border-radius: 12px; overflow: hidden; border: 2px solid #003366; margin-bottom: 15px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-order { text-decoration: none; color: white; border: 2px solid #003366; padding: 12px; border-radius: 8px; display: block; font-weight: bold; text-align: center; background: rgba(0, 51, 102, 0.4); }
    </style>
</head>
<body>

    <img src="https://files.catbox.moe/8awfyi.png" class="chibi-deco chibi-left" alt="Chibi">
    <img src="https://files.catbox.moe/70c7u2.png" class="chibi-deco chibi-right" alt="Chibi">

    <header>
        <h1>HASIL KARYA FATE</h1>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="karya.html" style="background: #003366; color: white;">Karya</a>
            <a href="kontak.html">Kontak</a>
            <a href="#upload-form-container" id="admin-tab">Menu Admin Fate</a>
        </div>
        
        <div class="admin-section">
            <button class="btn-login" id="login-trigger" onclick="checkAdmin()">Admin Login</button>
            <div id="upload-form-container">
                <h2 style="margin-bottom: 15px; color:#ff4757;">➕ UPLOAD KARYA</h2>
                <div class="form-group">
                    <label>Nama Projek</label>
                    <input type="text" id="proj-name" placeholder="Contoh: Banner Anime">
                </div>
                <div class="form-group">
                    <label>Link Gambar</label>
                    <input type="text" id="proj-img" placeholder="https://files.catbox.moe/...">
                </div>
                <button class="btn-submit" onclick="addProject()">POSTING SEKARANG 🚀</button>
            </div>
        </div>
    </header>

    <main class="gallery-container" id="gallery"></main>
